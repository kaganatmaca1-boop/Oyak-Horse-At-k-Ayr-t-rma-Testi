<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OYAK HORSE Atık Ayrıştırma Eğitimi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; }
        .hidden { display: none !important; }
        .option-btn { transition: all 0.2s; }
        .option-btn:disabled { cursor: not-allowed; }
        .correct-answer { background-color: #22c55e !important; color: white !important; border-color: #22c55e !important; }
        .wrong-answer { background-color: #ef4444 !important; color: white !important; border-color: #ef4444 !important; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-slate-800">

    <div id="app" class="w-full max-w-2xl bg-white rounded-xl shadow-lg overflow-hidden m-4 border border-slate-200">
        
        <!-- Başlık Bölümü -->
        <div class="bg-slate-900 text-white p-6 text-center">
            <h1 class="text-2xl font-bold tracking-wide">OYAK HORSE</h1>
            <p id="header-subtitle" class="text-slate-400 mt-1 uppercase text-sm font-semibold tracking-widest">Atık Ayrıştırma Eğitim Portalı</p>
        </div>

        <div class="p-8">
            <!-- Kullanıcı Giriş Ekranı -->
            <div id="screen-login">
                <div class="mb-5">
                    <label class="block text-sm font-bold text-slate-700 mb-2" for="user-name">Ad Soyad</label>
                    <input type="text" id="user-name" class="w-full border border-slate-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-slate-500 transition-all" placeholder="Tam adınızı giriniz">
                </div>
                <div class="mb-8">
                    <label class="block text-sm font-bold text-slate-700 mb-2" for="user-dept">Departman / Birim</label>
                    <select id="user-dept" class="w-full border border-slate-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-slate-500 transition-all bg-white">
                        <option value="">Seçim Yapınız</option>
                        <option value="Üretim">Üretim</option>
                        <option value="Kalite">Kalite</option>
                        <option value="Bakım">Bakım</option>
                        <option value="Lojistik">Lojistik</option>
                        <option value="İnsan Kaynakları">İnsan Kaynakları</option>
                        <option value="Mühendislik">Mühendislik</option>
                        <option value="İdari İşler">İdari İşler</option>
                    </select>
                </div>
                <div id="login-error" class="text-red-600 text-sm mb-6 hidden font-medium">Lütfen tüm alanları doldurunuz.</div>
                <div class="space-y-3">
                    <button onclick="startQuiz()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-lg hover:bg-slate-800 transition-colors shadow-md">Eğitime Başla</button>
                    <button onclick="showStats()" class="w-full bg-slate-100 text-slate-700 font-bold py-4 rounded-lg hover:bg-slate-200 transition-colors">İstatistikleri Görüntüle</button>
                </div>
            </div>

            <!-- Soru Ekranı -->
            <div id="screen-quiz" class="hidden">
                <div class="flex justify-between items-center mb-4 text-xs font-bold text-slate-400 uppercase tracking-tighter">
                    <span id="question-counter">Soru: 0 / 0</span>
                    <span id="score-display">Puan: 0</span>
                </div>
                
                <div class="w-full bg-slate-100 rounded-full h-2 mb-8">
                    <div id="progress-bar" class="bg-slate-900 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>

                <div class="mb-8 flex justify-center bg-slate-50 rounded-xl border border-slate-100 overflow-hidden">
                    <img id="question-image" src="" alt="Atık Örneği" class="max-h-72 object-contain hidden p-4">
                </div>

                <h2 id="question-text" class="text-xl font-bold mb-8 text-slate-800 leading-tight text-center">Yükleniyor...</h2>
                
                <div id="options-container" class="grid grid-cols-1 gap-3"></div>

                <div class="mt-10 flex justify-center">
                    <button id="next-btn" onclick="nextQuestion()" class="hidden bg-slate-900 text-white font-bold py-3 px-10 rounded-full hover:bg-slate-800 shadow-lg">Sıradaki Soru</button>
                </div>
            </div>

            <!-- Sonuç Ekranı -->
            <div id="screen-result" class="hidden text-center py-6">
                <div class="mb-4 inline-block p-4 rounded-full bg-slate-50">
                    <svg class="w-16 h-16 text-slate-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <h2 class="text-3xl font-extrabold text-slate-900 mb-2">Eğitim Tamamlandı</h2>
                <div class="text-6xl font-black text-slate-900 my-8" id="final-score">0 / 0</div>
                <p id="result-message" class="mb-10 text-slate-600 font-medium px-4"></p>
                
                <div class="flex flex-col gap-3">
                    <button onclick="showStats()" class="bg-slate-900 text-white font-bold py-4 rounded-lg hover:bg-slate-800">Verileri Görüntüle</button>
                    <button onclick="appReset()" class="bg-slate-100 text-slate-700 font-bold py-4 rounded-lg hover:bg-slate-200">Yeni Katılımcı</button>
                </div>
            </div>

            <!-- İstatistik Ekranı -->
            <div id="screen-stats" class="hidden">
                <div class="flex items-center justify-between mb-8 border-b border-slate-100 pb-4">
                    <h2 class="text-2xl font-black text-slate-900">İstatistikler</h2>
                    <button onclick="appReset()" class="text-slate-400 hover:text-slate-900 text-sm font-bold">Kapat</button>
                </div>
                
                <div class="mb-10">
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Departman Başarı Oranları</h3>
                    <div class="bg-slate-50 rounded-xl p-2">
                        <table class="w-full text-left text-sm">
                            <thead>
                                <tr class="text-slate-500">
                                    <th class="py-3 px-4">Birim</th>
                                    <th class="py-3 px-4">Katılımcı</th>
                                    <th class="py-3 px-4 text-right">Ortalama</th>
                                </tr>
                            </thead>
                            <tbody id="dept-stats-body" class="text-slate-800 font-semibold"></tbody>
                        </table>
                    </div>
                </div>

                <div>
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Son Katılımlar</h3>
                    <div class="bg-slate-50 rounded-xl p-2 max-h-64 overflow-y-auto">
                        <table class="w-full text-left text-sm">
                            <thead>
                                <tr class="text-slate-500 border-b border-slate-200">
                                    <th class="py-3 px-4">İsim</th>
                                    <th class="py-3 px-4">Departman</th>
                                    <th class="py-3 px-4 text-right">Skor</th>
                                </tr>
                            </thead>
                            <tbody id="user-stats-body" class="text-slate-700"></tbody>
                        </table>
                    </div>
                </div>

                <div class="mt-8 flex flex-col gap-3">
                    <button onclick="exportData()" class="w-full bg-emerald-700 text-white font-bold py-4 rounded-lg hover:bg-emerald-800 shadow-md">Raporu İndir (CSV)</button>
                    <button onclick="clearAllData()" class="w-full border border-red-200 text-red-500 text-xs py-2 rounded-lg hover:bg-red-50">Tüm Kayıtları Sıfırla</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const atikSorulari = [
            {
                question: "Üretim sahasında kullanılan kontamine olmuş (yağlı) üstüpüler hangi kutuya atılmalıdır?",
                options: ["Evsel atık", "Tehlikeli atık", "Naylon atık", "Atık karton"],
                correctAnswer: 1,
                image: "https://placehold.co/600x400/1e293b/ffffff?text=[Image+of+Yağlı+Üstüpü]"
            },
            {
                question: "Kullanım ömrünü tamamlamış emici pedlerin kapları nereye atılır?",
                options: ["Absorban kabı", "Tehlikeli atık", "Dönüşümlü ambalaj atığı", "Plastik atık"],
                correctAnswer: 0,
                image: "https://placehold.co/600x400/1e293b/ffffff?text=[Image+of+Absorban+Kabı]"
            },
            {
                question: "Sevkiyat biriminden çıkan temiz ve boş karton kutular hangi kategoriye dahildir?",
                options: ["Kağıt atık", "Dönüşümlü ambalaj atığı", "Atık karton", "Evsel atık"],
                correctAnswer: 2,
                image: "https://placehold.co/600x400/1e293b/ffffff?text=[Image+of+Atık+Karton]"
            },
            {
                question: "Üretim hattındaki shrink ambalajlar ve temiz streç filmler hangi kutuda toplanmalıdır?",
                options: ["Naylon atık", "Plastik atık", "Dönüşümlü ambalaj atığı", "Kağıt atık"],
                correctAnswer: 0,
                image: "https://placehold.co/600x400/1e293b/ffffff?text=[Image+of+Naylon+Atık]"
            },
            {
                question: "Ofislerde kullanılan standart fotokopi kağıtları ve dökümanlar nereye atılmalıdır?",
                options: ["Atık karton", "Kağıt atık", "Naylon atık", "Dönüşümlü ambalaj atığı"],
                correctAnswer: 1,
                image: "https://placehold.co/600x400/1e293b/ffffff?text=[Image+of+Kağıt+Atık]"
            },
            {
                question: "Üretimden çıkan hatalı sert plastik parçalar hangi kutuya atılır?",
                options: ["Naylon atık", "Tehlikeli atık", "Plastik atık", "Dönüşümlü ambalaj atığı"],
                correctAnswer: 2,
                image: "https://placehold.co/600x400/1e293b/ffffff?text=[Image+of+Plastik+Atık]"
            },
            {
                question: "Plastik içecek şişeleri ve metal kutu içeceklerin genel sınıflandırması nedir?",
                options: ["Dönüşümlü ambalaj atığı", "Evsel atık", "Plastik atık", "Naylon atık"],
                correctAnswer: 0,
                image: "https://placehold.co/600x400/1e293b/ffffff?text=[Image+of+Ambalaj+Atığı]"
            },
            {
                question: "Islanmış peçete, süprüntü ve geri dönüştürülemeyen genel atıklar nereye atılır?",
                options: ["Kağıt atık", "Tehlikeli atık", "Evsel atık", "Naylon atık"],
                correctAnswer: 2,
                image: "https://placehold.co/600x400/1e293b/ffffff?text=[Image+of+Evsel+Atık]"
            },
            {
                question: "Kimyasal bulaşmış boş plastik bidonlar hangi sınıfa girer?",
                options: ["Plastik atık", "Tehlikeli atık", "Absorban kabı", "Dönüşümlü ambalaj atığı"],
                correctAnswer: 1,
                image: "https://placehold.co/600x400/1e293b/ffffff?text=[Image+of+Tehlikeli+Atık]"
            },
            {
                question: "Üretim alanındaki temiz naylon poşetler ve torbalar için hangi kutu kullanılmalıdır?",
                options: ["Evsel atık", "Dönüşümlü ambalaj atığı", "Naylon atık", "Plastik atık"],
                correctAnswer: 2,
                image: "https://placehold.co/600x400/1e293b/ffffff?text=[Image+of+Naylon+Atık]"
            }
        ];

        let state = {
            currentUser: "",
            currentDept: "",
            index: 0,
            score: 0,
            currentSet: [],
            records: JSON.parse(localStorage.getItem('oyak_waste_data')) || []
        };

        function showScreen(id) {
            ['screen-login', 'screen-quiz', 'screen-result', 'screen-stats'].forEach(s => {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

        function startQuiz() {
            const name = document.getElementById('user-name').value.trim();
            const dept = document.getElementById('user-dept').value;

            if (!name || !dept) {
                document.getElementById('login-error').classList.remove('hidden');
                return;
            }

            state.currentUser = name;
            state.currentDept = dept;
            state.index = 0;
            state.score = 0;
            state.currentSet = [...atikSorulari].sort(() => Math.random() - 0.5);

            showScreen('screen-quiz');
            renderQuestion();
        }

        function renderQuestion() {
            const q = state.currentSet[state.index];
            document.getElementById('question-counter').innerText = `Soru: ${state.index + 1} / ${state.currentSet.length}`;
            document.getElementById('score-display').innerText = `Puan: ${state.score}`;
            document.getElementById('progress-bar').style.width = `${((state.index + 1) / state.currentSet.length) * 100}%`;
            
            const img = document.getElementById('question-image');
            img.src = q.image;
            img.classList.remove('hidden');

            document.getElementById('question-text').innerText = q.question;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            document.getElementById('next-btn').classList.add('hidden');

            q.options.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = 'option-btn w-full text-left p-5 border border-slate-200 rounded-xl hover:bg-slate-50 font-bold text-slate-700 transition-all shadow-sm';
                b.innerText = opt;
                b.onclick = () => handleSelection(i, b);
                container.appendChild(b);
            });
        }

        function handleSelection(idx, btn) {
            const q = state.currentSet[state.index];
            const correct = idx === q.correctAnswer;
            const btns = document.querySelectorAll('.option-btn');
            
            btns.forEach((b, i) => {
                b.disabled = true;
                if (i === q.correctAnswer) b.classList.add('correct-answer');
                else if (i === idx && !correct) b.classList.add('wrong-answer');
            });

            if (correct) state.score++;
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            state.index++;
            if (state.index < state.currentSet.length) {
                renderQuestion();
            } else {
                finish();
            }
        }

        function finish() {
            const record = {
                name: state.currentUser,
                dept: state.currentDept,
                score: state.score,
                date: new Date().toLocaleDateString('tr-TR')
            };
            state.records.push(record);
            localStorage.setItem('oyak_waste_data', JSON.stringify(state.records));

            document.getElementById('final-score').innerText = `${state.score} / ${state.currentSet.length}`;
            let msg = state.score >= 8 ? "Tebrikler! Atık yönetimi konusunda yüksek bilince sahipsiniz." : "Başarılı. Ancak atık kutusu tanımlarını tekrar gözden geçirmeniz faydalı olacaktır.";
            document.getElementById('result-message').innerText = msg;
            showScreen('screen-result');
        }

        function showStats() {
            renderStatsTable();
            showScreen('screen-stats');
        }

        function renderStatsTable() {
            const deptMap = {};
            state.records.forEach(r => {
                if (!deptMap[r.dept]) deptMap[r.dept] = { sum: 0, count: 0 };
                deptMap[r.dept].sum += r.score;
                deptMap[r.dept].count++;
            });

            const dBody = document.getElementById('dept-stats-body');
            dBody.innerHTML = '';
            Object.keys(deptMap).sort().forEach(d => {
                const avg = (deptMap[d].sum / deptMap[d].count).toFixed(1);
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="py-3 px-4 border-b border-slate-100">${d}</td><td class="py-3 px-4 border-b border-slate-100">${deptMap[d].count}</td><td class="py-3 px-4 border-b border-slate-100 text-right">${avg}</td>`;
                dBody.appendChild(tr);
            });

            const uBody = document.getElementById('user-stats-body');
            uBody.innerHTML = '';
            [...state.records].reverse().slice(0, 20).forEach(r => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="py-3 px-4 border-b border-slate-200">${r.name}</td><td class="py-3 px-4 border-b border-slate-200 text-xs">${r.dept}</td><td class="py-3 px-4 border-b border-slate-200 text-right font-bold">${r.score}</td>`;
                uBody.appendChild(tr);
            });
        }

        function exportData() {
            if (state.records.length === 0) return;
            let csv = "Ad Soyad;Departman;Skor;Tarih\n";
            state.records.forEach(r => {
                csv += `${r.name};${r.dept};${r.score};${r.date}\n`;
            });
            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "oyak_atik_raporu.csv";
            link.click();
        }

        function clearAllData() {
            if (confirm("Tüm istatistik verilerini silmek istediğinize emin misiniz?")) {
                state.records = [];
                localStorage.removeItem('oyak_waste_data');
                renderStatsTable();
            }
        }

        function appReset() {
            document.getElementById('user-name').value = '';
            document.getElementById('user-dept').value = '';
            document.getElementById('login-error').classList.add('hidden');
            showScreen('screen-login');
        }
    </script>
</body>
</html>
